databases:
  - name: quicksync-db
    databaseName: quicksync
    user: quicksync
    plan: free
    region: oregon
    ipAllowList: [] # allow all — restrict after launch if needed

services:
  - name: quicksync-backend
    type: web
    runtime: docker
    dockerfilePath: ./BackEnd/backend/Dockerfile.render
    dockerContext: ./BackEnd/backend
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: QuickSync
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          name: quicksync-backend
          type: web
          property: host
      - key: APP_KEY
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: quicksync-frontend
          type: web
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: quicksync-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: quicksync-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: quicksync-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: quicksync-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: quicksync-db
          property: password
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stderr
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: hichamkama20@gmail.com
      - key: MAIL_FROM_NAME
        value: QuickSync
      - key: MAIL_USERNAME
        sync: false   # set manually in Render dashboard
      - key: MAIL_PASSWORD
        sync: false   # set manually in Render dashboard

  - name: quicksync-frontend
    type: web
    runtime: docker
    dockerfilePath: ./FrontEnd/my-app/Dockerfile
    dockerContext: ./FrontEnd/my-app
    plan: free
    region: oregon
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false  # set manually after backend deploys — must be a build env var too
