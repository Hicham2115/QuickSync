services:
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: QuickSync
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./BackEnd/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./BackEnd/backend:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_KEY: "base64:oxwkwKmcmKb3Lgy/K4czDNukXcTe42LegWkl/vi1EdE="
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: QuickSync
      DB_USERNAME: root
      DB_PASSWORD: secret
      CACHE_STORE: database
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./FrontEnd/my-app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./FrontEnd/my-app:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  db_data:
